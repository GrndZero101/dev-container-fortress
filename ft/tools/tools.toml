[tools.tenv]
description = "Terraform and OpenTofu version manager."
version = "4.8.3"
enabled = true
install_root = "/usr/local/bin"
healthcheck = ["tenv", "--version"]
variables = { github_repo = "tofuutils/tenv", release_tag = "v4.8.3", asset_prefix = "tenv_v4.8.3" }

[tools.tenv.integrity]
checksum_url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{asset_prefix}_checksums.txt"
checksum_format = "sha256sum"
signature_url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{asset_prefix}_checksums.txt.sig"
certificate_url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{asset_prefix}_checksums.txt.pem"

[[tools.tenv.assets]]
os = "linux"
arch = "amd64"
filename = "{asset_prefix}_Linux_x86_64.tar.gz"
url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{filename}"
archive = "tar.gz"
binary_path = "tenv"

[[tools.tenv.assets]]
os = "linux"
arch = "arm64"
filename = "{asset_prefix}_Linux_arm64.tar.gz"
url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{filename}"
archive = "tar.gz"
binary_path = "tenv"

[tools.starship]
description = "Cross-shell prompt renderer."
version = "1.24.2"
enabled = true
install_root = "/usr/local/bin"
healthcheck = ["starship", "--version"]
variables = { github_repo = "starship/starship", release_tag = "v1.24.2", asset_prefix = "starship" }

[tools.starship.integrity]
checksum_url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{filename}.sha256"
checksum_format = "sha256sum"

[[tools.starship.assets]]
os = "linux"
arch = "amd64"
filename = "{asset_prefix}-x86_64-unknown-linux-musl.tar.gz"
url_template = "https://github.com/{github_repo}/releases/download/{release_tag}/{filename}"
archive = "tar.gz"
binary_path = "starship"
