---
- name: Assert Docker role only runs on Ubuntu targets
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
      - ansible_facts['distribution'] == 'Ubuntu'
    fail_msg: >-
      dev_fortress_docker currently supports Ubuntu targets only.

- name: Assert Docker-managed Ubuntu targets use systemd
  ansible.builtin.assert:
    that:
      - ansible_facts['service_mgr'] == 'systemd'
    fail_msg: >-
      Docker CE management currently expects systemd on Ubuntu workstation and
      cloud targets. For WSL, enable systemd first before running Dev Fortress
      Docker bootstrap.

- name: Ensure Docker apt prerequisite packages are present
  become: true
  ansible.builtin.apt:
    name: "{{ dev_container_fortress_docker_apt_prerequisite_packages }}"
    state: present

- name: Ensure apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Remove conflicting distro Docker packages
  become: true
  ansible.builtin.apt:
    name: "{{ dev_container_fortress_docker_conflicting_packages }}"
    state: absent
    purge: false

- name: Install Docker repository signing key
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Configure Docker apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dev_container_fortress_docker_repo_architecture_effective }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install Docker CE and plugins
  become: true
  ansible.builtin.apt:
    name: "{{ dev_container_fortress_docker_packages }}"
    state: present

- name: Ensure Docker daemon config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install managed Docker daemon config
  become: true
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Docker

- name: Ensure containerd service is enabled and started
  become: true
  ansible.builtin.service:
    name: containerd
    enabled: true
    state: started

- name: Ensure Docker service is enabled and started
  become: true
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Ensure target users are members of the docker group
  become: true
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ dev_container_fortress_docker_users_effective }}"
