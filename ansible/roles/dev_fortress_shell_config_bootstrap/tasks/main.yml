---
- name: Ensure shell-config checkout is present
  ansible.builtin.git:
    repo: "{{ dev_container_fortress_shell_config_repo_effective }}"
    dest: "{{ dev_container_fortress_shell_config_dir_effective }}"
    version: "{{ dev_container_fortress_shell_config_branch_effective }}"
    update: true
  register: dev_fortress_shell_config_bootstrap_checkout

- name: Check for shell-config bootstrap script
  ansible.builtin.stat:
    path: "{{ dev_container_fortress_shell_config_dir_effective }}/scripts/csm"
  register: dev_fortress_shell_config_bootstrap_csm_stat

- name: Assert shell-config bootstrap script is available
  ansible.builtin.assert:
    that:
      - dev_fortress_shell_config_bootstrap_csm_stat.stat.exists
      - dev_fortress_shell_config_bootstrap_csm_stat.stat.executable
    fail_msg: >-
      shell-config checkout at {{ dev_container_fortress_shell_config_dir_effective }}
      does not provide an executable scripts/csm entrypoint
  when:
    - not ansible_check_mode or dev_fortress_shell_config_bootstrap_csm_stat.stat.exists

- name: Ensure isolated ZDOTDIR exists for shell-config bootstrap
  ansible.builtin.file:
    path: >-
      {{ dev_container_fortress_xdg_cache_home_effective }}/
      dev-container-fortress/csm-bootstrap-zdotdir
    state: directory
    mode: "0755"

- name: Run shell-config bootstrap
  ansible.builtin.command:
    argv:
      - zsh
      - -f
      - "{{ dev_container_fortress_shell_config_dir_effective }}/scripts/csm"
      - bootstrap
  environment:
    ZDOTDIR: >-
      {{ dev_container_fortress_xdg_cache_home_effective }}/
      dev-container-fortress/csm-bootstrap-zdotdir
  register: dev_fortress_shell_config_bootstrap_run
  changed_when: >-
    ' linked ' in dev_fortress_shell_config_bootstrap_run.stdout
    or ' moved existing ' in dev_fortress_shell_config_bootstrap_run.stdout
  when: dev_fortress_shell_config_bootstrap_csm_stat.stat.exists

- name: Ensure shell-config active-profile state directory exists
  ansible.builtin.file:
    path: "{{ dev_container_fortress_shell_config_state_file_effective | dirname }}"
    state: directory
    mode: "0755"

- name: Persist selected shell-config profile
  ansible.builtin.copy:
    dest: "{{ dev_container_fortress_shell_config_state_file_effective }}"
    content: "{{ dev_container_fortress_shell_config_profile_effective }}\n"
    mode: "0644"
