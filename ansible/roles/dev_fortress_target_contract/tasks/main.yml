---
- name: Validate core target contract variables
  ansible.builtin.assert:
    that:
      - dev_fortress_target_kind is defined
      - dev_fortress_target_tags is defined
      - ansible_facts['user_id'] is defined
      - ansible_facts['env']['HOME'] is defined
      - dev_container_fortress_shell_config_repo_effective | length > 0
      - dev_container_fortress_shell_config_branch_effective | length > 0
      - dev_container_fortress_shell_config_dir_effective | length > 0
      - dev_container_fortress_shell_config_profile_effective | length > 0
    fail_msg: >-
      Dev Fortress bootstrap expects the generated inventory contract plus
      gathered facts for the target user, home directory, and shell-config
      integration settings.
    success_msg: Target contract and gathered facts look usable.

- name: Record normalized target contract details
  ansible.builtin.set_fact:
    dev_fortress_target_contract_host:
      target: "{{ inventory_hostname }}"
      kind: "{{ dev_fortress_target_kind }}"
      tags: "{{ dev_fortress_target_tags }}"
      user: "{{ ansible_facts['user_id'] }}"
      home: "{{ ansible_facts['env']['HOME'] }}"
