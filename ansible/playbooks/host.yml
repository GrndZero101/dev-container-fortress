---
- name: Dev Container Fortress host bootstrap
  hosts: "{{ dev_container_fortress_ansible_hosts | default('all') }}"
  gather_facts: true

  vars:
    dev_container_fortress_shell_config_repo_effective: >-
      {{ dev_container_fortress_shell_config_repo | default('https://github.com/GrndZero101/shell-config.git') }}
    dev_container_fortress_shell_config_branch_effective: >-
      {{ dev_container_fortress_shell_config_branch | default('main') }}
    dev_container_fortress_shell_config_dir_effective: >-
      {{ dev_container_fortress_shell_config_dir | default(ansible_facts['env']['HOME'] ~ '/.config/shell-config') }}
    dev_container_fortress_shell_config_profile_effective: >-
      {{ dev_container_fortress_shell_config_profile | default('zsh-tll-citadel-dev-fortress') }}
    dev_container_fortress_required_xdg_dirs:
      - "{{ ansible_facts['env']['HOME'] }}/.config"
      - "{{ ansible_facts['env']['HOME'] }}/.local"
      - "{{ ansible_facts['env']['HOME'] }}/.local/bin"
      - "{{ ansible_facts['env']['HOME'] }}/.local/share"
      - "{{ ansible_facts['env']['HOME'] }}/.local/state"
      - "{{ ansible_facts['env']['HOME'] }}/.cache"
    dev_container_fortress_ubuntu_baseline_packages:
      - ca-certificates
      - curl
      - git
      - python3
      - python3-venv
      - rsync
      - zsh
    dev_container_fortress_alpine_baseline_packages:
      - ca-certificates
      - curl
      - git
      - python3
      - rsync
      - zsh

  pre_tasks:
    - name: Prove Ansible reachability
      ansible.builtin.ping:

  roles:
    - role: dev_fortress_target_contract
    - role: dev_fortress_xdg_layout
    - role: dev_fortress_ubuntu_base_packages
      when:
        - ansible_facts['os_family'] == 'Debian'
        - ansible_facts['distribution'] == 'Ubuntu'
    - role: dev_fortress_alpine_base_packages
      when:
        - ansible_facts['os_family'] == 'Alpine'
    - role: dev_fortress_shell_config_ready
